name: Update random comic

on:
  schedule:
    - cron: '17 8 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-random-comic:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout profile repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Shuffle README comic
        run: node scripts/update-random-comic.mjs

      - name: Commit comic shuffle
        run: |
          if git diff --quiet README.md; then
            echo "Comic stayed put. The universe is suspiciously stable."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "Shuffle random profile comic"
          git push
